# Tema base de la app — transcripción de los tokens CLAROS de styles.css
# (ARD-17: --accent / --surface-bg / --surface-elevated / --text-primary /
# --border-subtle). Se define un ÚNICO [theme]: un tema con solo [theme] fija la
# app a un modo y quita el selector nativo de tema. El modo oscuro se difiere a la
# export estática (Fase 2), donde el toggle manual es instantáneo vía CSS.

[theme]
base = "light"
primaryColor = "#4299e1"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#f3f4f6"
textColor = "#1a202c"
borderColor = "#e2e8f0"
