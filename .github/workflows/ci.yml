# CI — corre la suite de pytest en cada PR y en cada push a main.
#
# Por qué existe (issue #14): la convención del equipo (§4) dice que mergeamos sin
# esperar revisión humana, así que el gate de merge es "tú + CI". Este workflow ES
# esa red de seguridad: la palomita verde reemplaza el "en mi compu sí jala".
#
# Qué garantiza la DoD del issue:
#   - check verde cuando los módulos importan y la suite completa de tests/ pasa (pipeline +
#     clasificador + métricas + contrato de handoff + LLM + páginas de la app);
#   - check ROJO si un módulo no importa (pasos "Import smoke check") o si un test falla.
#
# Nota de versión: el issue sugería alinear a 3.10/3.11, pero esa nota quedó
# desactualizada — el notebook real declara 3.13.1 y el entorno local corre 3.13.x con
# los tests en verde, así que fijamos 3.13.
#
# Ausencia de gates de estilo (T16, DECISIÓN consciente, no olvido): este CI corre import-
# smoke + pytest, pero NO tiene gate de lint/formato/type-check (flake8/ruff/black/mypy).
# Es deliberado para el alcance del proyecto: el estándar de estilo es la convención interna
# observada del repo (PEP 8 + docstrings Input/Output, umbrales externalizados, rutas por
# __file__), revisada en el self-review del PR, no por herramienta. Si el proyecto crece,
# añadir ruff/black como gate es el siguiente paso natural; hoy se omite a propósito.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# El job solo lee el repo; sin permisos de escritura (higiene de seguridad).
permissions:
  contents: read

# Si llega un push nuevo al mismo ref, cancela el run viejo en curso (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Smoke de import aislado: falla el job si pipeline_core no importa.
      # La carpeta 01_data_pipeline_and_eda/ empieza con dígito, así que no es un
      # paquete importable por su nombre; la añadimos al PYTHONPATH solo para este
      # paso (pytest lo resuelve aparte vía pyproject.toml).
      - name: Import smoke check
        run: python -c "import pipeline_core"
        env:
          PYTHONPATH: 01_data_pipeline_and_eda

      # Mismo smoke aislado para el módulo de Fase 2 (issue #43). La carpeta
      # 02_clasif_reglas_negocio/ también empieza con dígito; la añadimos al
      # PYTHONPATH solo para este paso. Defensa en profundidad: falla el job si
      # classifier_core no importa, aunque pytest también lo cubra.
      - name: Import smoke check (classifier)
        run: python -c "import classifier_core"
        env:
          PYTHONPATH: 02_clasif_reglas_negocio

      # Smoke aislado para el módulo de Fase 3 (LLM). Necesita 01_/02_ en el path
      # porque llm_integration importa pipeline_core/classifier_core en su guard de
      # ejecución; el import top-level del módulo no, pero los añadimos por robustez.
      # Falla el job si llm_integration no importa (p. ej. dependencia faltante).
      - name: Import smoke check (llm_integration)
        run: python -c "import llm_integration"
        env:
          PYTHONPATH: 03_llm_integration:02_clasif_reglas_negocio:01_data_pipeline_and_eda

      # Smoke aislado para el generador de la vista de red (T7). Solo importa el
      # módulo (no llama a la API): valida que agents/pydantic/dotenv resuelven y
      # que no quedó ningún error de sintaxis o de import a nivel de módulo.
      - name: Import smoke check (network intelligence view)
        run: python -c "import llm_integration_network_intelligence_view"
        env:
          PYTHONPATH: 03_llm_integration
          PYTHONUTF8: "1"

      # Smoke aislado para el bot de Telegram (T5/T7): sin token real, config.py
      # imprime un warning (no revienta) y bot.py no llama a main() al importarse
      # (guard __name__ == "__main__"). Es justo lo que habría atrapado el
      # _REPO_ROOT roto de T5 antes de llegar a producción.
      - name: Import smoke check (telegram bot)
        run: python -c "import bot"
        env:
          PYTHONPATH: 04_app/telegram_bot
          PYTHONUTF8: "1"

      # pytest toma su config (testpaths, pythonpath, -v) de pyproject.toml.
      # Incluye tests/test_app_smoke.py: import-smoke de las páginas de 04_app/
      # vía streamlit.testing.v1.AppTest (no es un paso aparte porque ya corre
      # dentro de la suite, con el pythonpath que pyproject.toml ya declara).
      - name: Run tests
        run: pytest
